<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tools & Skill | Erza Afinda Putri</title>
  <meta name="description" content="Tools dan Skill Erza Afinda Putri" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --c1:#2f1b0f;
      --c2:#5b361b;
      --c3:#8b5b2d;
      --c4:#c68a2f;
      --c5:#e5b04a;
      --text:#3f2514;
      --muted:#7c5a43;
      --line:#ead9c0;
      --bg1:#fffefb;
      --bg2:#fff8ed;
      --card:#fffdf8;
      --shadow:0 16px 40px rgba(80,44,22,.14);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;
      min-height:100%;
      font-family:"Poppins",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(229,176,74,.20), transparent 35%),
        linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 45%, #fffdf6 100%);
      overflow-x:hidden; /* no horizontal scroll */
    }

    .container{
      width:min(1320px,96%);
      min-height:92vh;
      margin:3vh auto;
      border-radius:26px;
      border:1px solid #ecdcc5;
      background:linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,250,241,.9));
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto 1fr;
      position:relative;
    }

    .navbar{
      min-height:78px;
      border-bottom:1px solid #ecdcc5;
      background:linear-gradient(90deg, rgba(255,248,233,.96), rgba(255,255,255,.94));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 18px;
      z-index:5;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu a{
      text-decoration:none;
      color:var(--c2);
      font-weight:800;
      padding:10px 16px;
      border-radius:14px;
      transition:.22s ease;
      font-size:1rem;
      background:transparent;
    }

    .menu a:hover{background:#fff;color:var(--c3)}

    .menu a.active{
      background:linear-gradient(145deg,#fffefb,#fff7ea);
      color:var(--c4);
      box-shadow:inset 0 -2px 0 rgba(198,138,47,.8);
    }

    .pattern{
      position:absolute;
      right:0; top:0; bottom:0;
      width:52%;
      opacity:.14;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22)),
        linear-gradient(45deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22));
      background-size:140px 200px;
    }

    .main{
      position:relative;
      z-index:2;
      padding:24px;
    }

    .content-card{
      border:1px solid #ecdcc5;
      border-radius:20px;
      background:linear-gradient(145deg,#fffefb,#fff8ee);
      box-shadow:0 10px 24px rgba(80,44,22,.10);
      padding:18px;
    }

    /* ===== HERO TOP (judul + office + bunga kiri kanan) ===== */
    .hero-area{
      position:relative;
      min-height:230px;
      margin-bottom:12px;
    }

    .heading{
      text-align:center;
      margin-bottom:12px;
      position:relative;
      z-index:2;
    }

    .heading h1{
      font-size:clamp(1.45rem,2.2vw,2rem);
      color:var(--c2);
      font-weight:800;
      margin-bottom:4px;
    }

    .heading h2{
      font-size:clamp(.9rem,1.35vw,1.08rem);
      color:var(--c3);
      font-weight:600;
    }

    .top-office{
      display:flex;
      justify-content:center;
      position:relative;
      z-index:2;
    }

    .group-card{
      border:1px solid #ecdcc5;
      border-radius:16px;
      background:#fffdf8;
      box-shadow:0 6px 16px rgba(80,44,22,.08);
      padding:11px;
    }

    .group-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
      border-bottom:1px dashed #ead7bd;
      padding-bottom:6px;
      flex-wrap:wrap;
    }

    .group-title{
      color:var(--c2);
      font-size:.92rem;
      font-weight:800;
    }

    .group-badge{
      font-size:.70rem;
      color:#8b5b2d;
      background:#fff3de;
      border:1px solid #efd7b2;
      border-radius:999px;
      padding:2px 8px;
      font-weight:700;
      white-space:nowrap;
    }

    /* ===== GRID ICON KECIL ===== */
    .tools-grid{
      display:grid;
      grid-template-columns:repeat(4,minmax(0,1fr));
      gap:7px;
      justify-items:center;
    }

    .tool-item{
      width:100%;
      max-width:72px;
      border:1px solid #ecd9bf;
      border-radius:10px;
      background:#fffdf7;
      overflow:hidden;
      box-shadow:0 3px 8px rgba(80,44,22,.07);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .tool-item:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 14px rgba(80,44,22,.10);
    }

    .thumb{
      width:100%;
      aspect-ratio:1/1;
      max-height:52px;
      background:linear-gradient(145deg,#f4ead9,#efe0c9);
      display:grid;
      place-items:center;
      overflow:hidden;
      padding:4px;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:contain;
      display:block;
    }

    .tool-name{
      padding:4px 3px 5px;
      text-align:center;
      color:#5b361b;
      font-size:.56rem;
      font-weight:700;
      background:#fffaf0;
      border-top:1px solid #f1e2ca;
      min-height:24px;
      line-height:1.1;
      display:grid;
      place-items:center;
    }

    /* Office dibuat sedikit lebih besar */
    .office-item{
      max-width:98px;
    }

    .office-item .thumb{
      max-height:68px;
      padding:5px;
    }

    .office-item .tool-name{
      font-size:.63rem;
      min-height:29px;
    }

    /* ===== BAWAH: kiri dev, kanan editing ===== */
    .bottom-two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      align-items:start;
    }

    /* ===== BUNGA MINI KIRI-KANAN (seperti index, diperkecil) ===== */
    .flower-side{
      position:absolute;
      top:22px;
      width:170px;
      height:105px;
      pointer-events:none;
      opacity:.62;
      z-index:1;
    }

    .flower-left{ left:14px; }
    .flower-right{ right:14px; transform:scaleX(-1); }

    .flower-side .sparkle{
      position:absolute;
      width:7px;height:7px;border-radius:50%;
      background:radial-gradient(circle, rgba(255,245,220,.95) 0%, rgba(255,245,220,.35) 45%, transparent 75%);
      animation:twinkleMini 3s ease-in-out infinite;
      filter:blur(.2px);
    }
    .flower-side .s1{ top:10px; left:40px; animation-delay:.2s; }
    .flower-side .s2{ top:28px; left:80px; width:6px;height:6px; animation-delay:1.1s; }
    .flower-side .s3{ top:9px; left:122px; width:6px;height:6px; animation-delay:1.9s; }

    .flower-mini{
      position:absolute;
      width:54px;height:54px;
      transform-origin:center;
      filter:drop-shadow(0 3px 5px rgba(113,74,36,.10));
      animation:swaySoftMini 6s ease-in-out infinite;
    }

    .flower-mini::before{
      content:"";
      position:absolute;
      left:50%;
      top:56%;
      width:2px;
      height:24px;
      background:linear-gradient(to bottom, #a48762, #8f7250);
      transform:translateX(-50%);
      opacity:.32;
      border-radius:10px;
    }

    .flower-mini .petal{
      position:absolute;
      width:17px;height:22px;
      border-radius:60% 60% 55% 55%;
      background:linear-gradient(165deg, #edd8b1, #cfa86b 70%, #be8e4c 100%);
      left:50%; top:50%;
      transform-origin:50% 95%;
      opacity:.74;
      box-shadow:inset 0 -1px 2px rgba(139,91,45,.13);
    }

    .flower-mini .petal:nth-child(1){ transform:translate(-50%,-50%) rotate(0deg) translateY(-14px);}
    .flower-mini .petal:nth-child(2){ transform:translate(-50%,-50%) rotate(45deg) translateY(-14px);}
    .flower-mini .petal:nth-child(3){ transform:translate(-50%,-50%) rotate(90deg) translateY(-14px);}
    .flower-mini .petal:nth-child(4){ transform:translate(-50%,-50%) rotate(135deg) translateY(-14px);}
    .flower-mini .petal:nth-child(5){ transform:translate(-50%,-50%) rotate(180deg) translateY(-14px);}
    .flower-mini .petal:nth-child(6){ transform:translate(-50%,-50%) rotate(225deg) translateY(-14px);}
    .flower-mini .petal:nth-child(7){ transform:translate(-50%,-50%) rotate(270deg) translateY(-14px);}
    .flower-mini .petal:nth-child(8){ transform:translate(-50%,-50%) rotate(315deg) translateY(-14px);}

    .flower-mini .core{
      position:absolute;
      left:50%; top:50%;
      width:13px;height:13px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #f7e5c8 0%, #d3a465 45%, #8f6237 100%);
      box-shadow:0 0 0 3px rgba(243,221,181,.20);
    }

    .fm1{ left:0; top:18px; }
    .fm2{ left:56px; top:4px; width:48px;height:48px; animation-direction:reverse; }
    .fm3{ left:106px; top:22px; width:52px;height:52px; }

    @keyframes swaySoftMini{
      0%,100%{ transform:rotate(0deg) translateY(0); }
      25%{ transform:rotate(1.4deg) translateY(-1px); }
      50%{ transform:rotate(0deg) translateY(1px); }
      75%{ transform:rotate(-1.4deg) translateY(-1px); }
    }

    @keyframes twinkleMini{
      0%,100%{ opacity:.24; transform:scale(.8); }
      50%{ opacity:.7; transform:scale(1.1); }
    }

    /* ===== Responsive ===== */
    @media (max-width:980px){
      .bottom-two{ grid-template-columns:1fr; }
      .flower-side{ display:none; } /* agar tidak sempit */
      .hero-area{ min-height:auto; }
      .pattern{ width:100%; }
    }

    @media (max-width:640px){
      .main{ padding:16px; }
      .menu a{ font-size:.92rem; padding:8px 12px; }
      .tools-grid{ grid-template-columns:repeat(3,minmax(0,1fr)); }
      .tool-item{ max-width:66px; }
      .thumb{ max-height:50px; }
    }

    @media (max-width:420px){
      .tools-grid{ grid-template-columns:repeat(3,minmax(0,1fr)); gap:6px; }
      .tool-item{ max-width:62px; }
      .thumb{ max-height:46px; }
      .tool-name{ font-size:.52rem; }
      .office-item{ max-width:88px; }
      .office-item .thumb{ max-height:62px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pattern" aria-hidden="true"></div>

    <header class="navbar">
      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="education.html">Education</a>
        <a href="pengalaman.html">Experience</a>
        <a class="active" href="tools-skill.html">Tools & Skill</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="main">
      <section class="content-card">

        <section class="hero-area">
          <!-- bunga kiri -->
          <div class="flower-side flower-left" aria-hidden="true">
            <span class="sparkle s1"></span>
            <span class="sparkle s2"></span>
            <span class="sparkle s3"></span>

            <div class="flower-mini fm1">
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="core"></span>
            </div>
            <div class="flower-mini fm2">
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="core"></span>
            </div>
            <div class="flower-mini fm3">
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="core"></span>
            </div>
          </div>

          <!-- bunga kanan -->
          <div class="flower-side flower-right" aria-hidden="true">
            <span class="sparkle s1"></span>
            <span class="sparkle s2"></span>
            <span class="sparkle s3"></span>

            <div class="flower-mini fm1">
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="core"></span>
            </div>
            <div class="flower-mini fm2">
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="core"></span>
            </div>
            <div class="flower-mini fm3">
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
              <span class="core"></span>
            </div>
          </div>

          <div class="heading">
            <h1>Tools & Skill</h1>
            <h2>Software yang saya kuasai berdasarkan kategori</h2>
          </div>

          <!-- Office di tengah atas -->
          <section class="top-office">
            <article class="group-card" style="width:min(280px,100%);">
              <div class="group-head">
                <h3 class="group-title">Microsoft Office</h3>
                <span class="group-badge">Productivity</span>
              </div>
              <div class="tools-grid" style="grid-template-columns:1fr;">
                <div class="tool-item office-item">
                  <div class="thumb">
                    <img src="Gambar/Office.webp" alt="Microsoft Office" data-fallback="Office">
                  </div>
                  <div class="tool-name">Microsoft Office</div>
                </div>
              </div>
            </article>
          </section>
        </section>

        <!-- bawah: kiri dev, kanan editing -->
        <section class="bottom-two">
          <article class="group-card">
            <div class="group-head">
              <h3 class="group-title">Development Tools</h3>
              <span class="group-badge">Programming</span>
            </div>
            <div class="tools-grid">
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Viscode.png" alt="Visual Studio Code" data-fallback="VS Code"></div>
                <div class="tool-name">VS Code</div>
              </div>
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Xampp.jpg" alt="XAMPP" data-fallback="XAMPP"></div>
                <div class="tool-name">XAMPP</div>
              </div>
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/MariaDB.png" alt="MariaDB" data-fallback="MariaDB"></div>
                <div class="tool-name">MariaDB</div>
              </div>
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Php.png" alt="PHP" data-fallback="PHP"></div>
                <div class="tool-name">PHP</div>
              </div>
            </div>
          </article>

          <article class="group-card">
            <div class="group-head">
              <h3 class="group-title">Editing</h3>
              <span class="group-badge">Design & Content</span>
            </div>
            <div class="tools-grid">
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Capcut.jpg" alt="CapCut" data-fallback="CapCut"></div>
                <div class="tool-name">CapCut</div>
              </div>
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Lightroom.webp" alt="Lightroom" data-fallback="Lightroom"></div>
                <div class="tool-name">Lightroom</div>
              </div>
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Coreldraw.webp" alt="CorelDRAW" data-fallback="CorelDRAW"></div>
                <div class="tool-name">CorelDRAW</div>
              </div>
              <div class="tool-item">
                <div class="thumb"><img src="Gambar/Canva.webp" alt="Canva" data-fallback="Canva"></div>
                <div class="tool-name">Canva</div>
              </div>
            </div>
          </article>
        </section>
      </section>
    </main>
  </div>

  <script>
    (function imageFallback(){
      const images = document.querySelectorAll("img[data-fallback]");
      images.forEach((img)=>{
        img.onerror = function(){
          const label = this.dataset.fallback || "Image";
          this.src = "https://via.placeholder.com/180x180?text=" + encodeURIComponent(label);
        };
      });
    })();
  </script>
</body>
