<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home | Erza Afinda Putri</title>
  <meta name="description" content="Portofolio Erza Afinda Putri" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --c1:#2f1b0f;
      --c2:#5b361b;
      --c3:#8b5b2d;
      --c4:#c68a2f;
      --c5:#e5b04a;
      --text:#3f2514;
      --muted:#7c5a43;
      --line:#ead9c0;
      --bg1:#fffefb;
      --bg2:#fff8ed;
      --card:#fffdf8;
      --shadow:0 16px 40px rgba(80,44,22,.14);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;
      min-height:100%;
      font-family:"Poppins",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(229,176,74,.20), transparent 35%),
        linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 45%, #fffdf6 100%);
    }

    body{
      overflow-y:auto;
    }

    .container{
      width:min(1320px,96%);
      min-height:94vh;
      margin:3vh auto;
      border-radius:26px;
      border:1px solid #ecdcc5;
      background:linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,250,241,.9));
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto 1fr;
      position:relative;
    }

    .navbar{
      min-height:78px;
      border-bottom:1px solid #ecdcc5;
      background:linear-gradient(90deg, rgba(255,248,233,.96), rgba(255,255,255,.94));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 18px;
      z-index:5;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu a{
      text-decoration:none;
      color:var(--c2);
      font-weight:800;
      padding:10px 16px;
      border-radius:14px;
      transition:.22s ease;
      font-size:1rem;
      background:transparent;
    }

    .menu a:hover{background:#fff;color:var(--c3)}

    .menu a.active{
      background:linear-gradient(145deg,#fffefb,#fff7ea);
      color:var(--c4);
      box-shadow:inset 0 -2px 0 rgba(198,138,47,.8);
    }

    .pattern{
      position:absolute;
      right:0; top:0; bottom:0;
      width:52%;
      opacity:.18;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22)),
        linear-gradient(45deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22));
      background-size:140px 200px;
    }

    .main{
      display:grid;
      grid-template-columns:1.05fr .95fr;
      min-height:0;
      position:relative;
      z-index:2;
    }

    .left{
      padding:30px 38px 28px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      gap:8px;
      transform:translateY(16px);
      position:relative;
    }

    .flower-group{
      position:absolute;
      top:18px;
      left:160px;
      width:340px;
      height:170px;
      pointer-events:none;
      z-index:1;
      opacity:.8;
      animation:floatGroup 9s ease-in-out infinite;
    }

    .sparkle{
      position:absolute;
      width:10px;
      height:10px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(255,245,220,.95) 0%, rgba(255,245,220,.35) 45%, transparent 75%);
      filter:blur(.2px);
      animation:twinkle 3.4s ease-in-out infinite;
    }
    .s1{ top:20px; left:84px; animation-delay:.2s; }
    .s2{ top:54px; left:158px; width:8px; height:8px; animation-delay:1.1s; }
    .s3{ top:16px; left:250px; width:9px; height:9px; animation-delay:2.1s; }

    .flower{
      position:absolute;
      width:104px;
      height:104px;
      transform-origin:center;
      filter:drop-shadow(0 5px 8px rgba(113,74,36,.12));
      animation:flowerSwing 7.5s ease-in-out infinite;
    }
    .f1{ left:0; top:24px; animation-delay:.3s; }
    .f2{ left:112px; top:4px; width:92px; height:92px; animation-delay:1.2s; }
    .f3{ left:210px; top:34px; width:100px; height:100px; animation-delay:.7s; }

    .flower::before{
      content:"";
      position:absolute;
      left:50%;
      top:56%;
      width:2px;
      height:50px;
      background:linear-gradient(to bottom, #a48762, #8f7250);
      transform:translateX(-50%);
      opacity:.4;
      border-radius:10px;
    }

    .flower .petal{
      position:absolute;
      width:32px;
      height:44px;
      border-radius:60% 60% 55% 55%;
      background:linear-gradient(165deg, #edd8b1, #cfa86b 70%, #be8e4c 100%);
      left:50%;
      top:50%;
      transform-origin:50% 95%;
      opacity:.78;
      box-shadow:inset 0 -1px 3px rgba(139,91,45,.16);
    }
    .flower .petal:nth-child(1){ transform:translate(-50%,-50%) rotate(0deg) translateY(-29px);}
    .flower .petal:nth-child(2){ transform:translate(-50%,-50%) rotate(45deg) translateY(-29px);}
    .flower .petal:nth-child(3){ transform:translate(-50%,-50%) rotate(90deg) translateY(-29px);}
    .flower .petal:nth-child(4){ transform:translate(-50%,-50%) rotate(135deg) translateY(-29px);}
    .flower .petal:nth-child(5){ transform:translate(-50%,-50%) rotate(180deg) translateY(-29px);}
    .flower .petal:nth-child(6){ transform:translate(-50%,-50%) rotate(225deg) translateY(-29px);}
    .flower .petal:nth-child(7){ transform:translate(-50%,-50%) rotate(270deg) translateY(-29px);}
    .flower .petal:nth-child(8){ transform:translate(-50%,-50%) rotate(315deg) translateY(-29px);}

    .flower .core{
      position:absolute;
      left:50%; top:50%;
      width:24px; height:24px;
      transform:translate(-50%,-50%);
      border-radius:50%;
      background:radial-gradient(circle at 30% 30%, #f7e5c8 0%, #d3a465 45%, #8f6237 100%);
      box-shadow:0 0 0 4px rgba(243,221,181,.22);
    }

    @keyframes flowerSwing{
      0%,100%{ transform:rotate(0deg) translateY(0); }
      25%{ transform:rotate(1.6deg) translateY(-2px); }
      50%{ transform:rotate(0deg) translateY(1px); }
      75%{ transform:rotate(-1.4deg) translateY(-1px); }
    }
    @keyframes floatGroup{
      0%,100%{ transform:translateY(0); }
      50%{ transform:translateY(-3px); }
    }
    @keyframes twinkle{
      0%,100%{ opacity:.25; transform:scale(.8); }
      50%{ opacity:.75; transform:scale(1.15); }
    }

    .dots{
      display:grid;
      grid-template-columns:repeat(3,8px);
      gap:7px;
      width:max-content;
      margin-bottom:8px;
      position:relative;
      z-index:2;
    }

    .dots span{
      width:5px;height:5px;border-radius:50%;
      background:var(--c2);opacity:.85;
    }

    .year{
      color:var(--muted);
      font-size:1.05rem;
      font-weight:600;
      margin-bottom:2px;
      position:relative;
      z-index:2;
    }

    .hero-name{
      font-size:clamp(2.2rem,4.9vw,4.1rem);
      line-height:1.05;
      color:var(--c2);
      font-weight:800;
      letter-spacing:.2px;
      position:relative;
      z-index:2;
    }

    .script{
      margin-top:8px;
      font-family:"Great Vibes",cursive;
      font-size:clamp(2.4rem,4.8vw,4.2rem);
      line-height:1;
      color:var(--c3);
      font-weight:400;
      position:relative;
      z-index:2;
    }

    .right{
      padding:18px 22px 12px;
      display:grid;
      place-items:center;
      min-height:0;
    }

    .photo-card{
      width:100%;
      max-width:320px;
      height:90%;
      min-height:460px;
      border-radius:22px;
      overflow:hidden;
      background:linear-gradient(145deg, #7a4a24, #5b361b 55%, #3e2412);
      position:relative;
      box-shadow:0 18px 38px rgba(90,52,26,.22);
      padding:8px 8px 0;
      margin:0 auto;
    }

    .photo-inner{
      width:100%;
      height:100%;
      border-radius:16px 16px 0 0;
      overflow:hidden;
      background:#f8f8f8 url("Gambar/Home.jpeg") center top / cover no-repeat;
    }

    .bookmark{
      position:absolute;
      top:12px;right:12px;
      width:22px;height:32px;
      border:4px solid #6a3a18;
      border-bottom:none;
      clip-path:polygon(0 0,100% 0,100% 100%,50% 80%,0 100%);
      background:#f5e5c9;
      z-index:2;
    }

    @media (max-width:1050px){
      .main{grid-template-columns:1fr}
      .left{
        transform:translateY(8px);
        padding:26px 22px 18px;
        justify-content:center;
      }
      .right{padding:10px 18px 18px}
      .photo-card{min-height:420px;max-width:300px;}
      .pattern{width:100%}
    }

    @media (max-width:640px){
      .container{
        margin:16px auto;
        min-height:auto;
      }

      .menu a{font-size:.92rem;padding:8px 12px}

      .left{
        padding-top:95px;
      }

      .flower-group{
        position:absolute;
        top:14px;
        right:14px;
        left:auto;
        width:230px;
        height:120px;
      }

      .flower{width:82px;height:82px}
      .flower .petal{width:26px;height:34px}
      .flower .petal:nth-child(1){ transform:translate(-50%,-50%) rotate(0deg) translateY(-22px);}
      .flower .petal:nth-child(2){ transform:translate(-50%,-50%) rotate(45deg) translateY(-22px);}
      .flower .petal:nth-child(3){ transform:translate(-50%,-50%) rotate(90deg) translateY(-22px);}
      .flower .petal:nth-child(4){ transform:translate(-50%,-50%) rotate(135deg) translateY(-22px);}
      .flower .petal:nth-child(5){ transform:translate(-50%,-50%) rotate(180deg) translateY(-22px);}
      .flower .petal:nth-child(6){ transform:translate(-50%,-50%) rotate(225deg) translateY(-22px);}
      .flower .petal:nth-child(7){ transform:translate(-50%,-50%) rotate(270deg) translateY(-22px);}
      .flower .petal:nth-child(8){ transform:translate(-50%,-50%) rotate(315deg) translateY(-22px);}
      .flower .core{width:22px;height:22px}

      .f1{left:0}
      .f2{left:80px}
      .f3{left:150px}

      .s1{left:60px}
      .s2{left:115px}
      .s3{left:185px}

      .photo-card{min-height:380px;max-width:260px;}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pattern" aria-hidden="true"></div>

    <header class="navbar">
      <nav class="menu">
        <a class="active" href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a href="education.html">Education</a>
        <a href="pengalaman.html">Experience</a>
        <a href="tools-skill.html">Tools & Skill</a>
        <a href="portofolio.html">Portofolio</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="main">
      <section class="left">
        <div class="flower-group" aria-hidden="true">
          <span class="sparkle s1"></span>
          <span class="sparkle s2"></span>
          <span class="sparkle s3"></span>

          <div class="flower f1">
            <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="core"></span>
          </div>

          <div class="flower f2">
            <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="core"></span>
          </div>

          <div class="flower f3">
            <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="petal"></span><span class="petal"></span><span class="petal"></span><span class="petal"></span>
            <span class="core"></span>
          </div>
        </div>

        <div class="dots" aria-hidden="true">
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
          <span></span><span></span><span></span>
        </div>
        <div class="year">2026</div>
        <h1 class="hero-name">Erza Afinda Putri</h1>
        <div class="script">Portofolio</div>
      </section>

      <section class="right">
        <div class="photo-card">
          <div class="bookmark"></div>
          <div class="photo-inner"></div>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
