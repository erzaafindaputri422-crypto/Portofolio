<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Erza Afinda Putri</title>
  <meta name="description" content="Kontak Erza Afinda Putri" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root{
      --c1:#2f1b0f;
      --c2:#5b361b;
      --c3:#8b5b2d;
      --c4:#c68a2f;
      --text:#3f2514;
      --muted:#7c5a43;
      --line:#ead9c0;
      --bg1:#fffefb;
      --bg2:#fff8ed;
      --shadow:0 16px 40px rgba(80,44,22,.14);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;
      min-height:100%;
      font-family:"Poppins",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(229,176,74,.20), transparent 35%),
        linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 45%, #fffdf6 100%);
    }

    .container{
      width:min(1320px,96%);
      min-height:92vh;
      margin:3vh auto;
      border-radius:26px;
      border:1px solid #ecdcc5;
      background:linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,250,241,.9));
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto 1fr;
      position:relative;
    }

    .navbar{
      min-height:78px;
      border-bottom:1px solid #ecdcc5;
      background:linear-gradient(90deg, rgba(255,248,233,.96), rgba(255,255,255,.94));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 18px;
      z-index:5;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu a{
      text-decoration:none;
      color:var(--c2);
      font-weight:800;
      padding:10px 16px;
      border-radius:14px;
      transition:.22s ease;
      font-size:1rem;
      background:transparent;
    }

    .menu a:hover{background:#fff;color:var(--c3)}

    .menu a.active{
      background:linear-gradient(145deg,#fffefb,#fff7ea);
      color:var(--c4);
      box-shadow:inset 0 -2px 0 rgba(198,138,47,.8);
    }

    .pattern{
      position:absolute;
      right:0; top:0; bottom:0;
      width:52%;
      opacity:.14;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22)),
        linear-gradient(45deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22));
      background-size:140px 200px;
    }

    .main{
      position:relative;
      z-index:2;
      padding:24px;
      display:grid;
      gap:18px;
    }

    .contact-card{
      border:1px solid #ecdcc5;
      border-radius:20px;
      background:linear-gradient(145deg,#fffefb,#fff8ee);
      box-shadow:0 10px 24px rgba(80,44,22,.10);
      padding:20px;
    }

    .heading{
      text-align:center;
      margin-bottom:14px;
    }

    .heading h1{
      font-size:clamp(1.35rem,2vw,1.9rem);
      color:var(--c2);
      font-weight:800;
      margin-bottom:4px;
    }

    .heading p{
      color:var(--c3);
      font-weight:600;
      font-size:.93rem;
    }

    .list{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:12px;
      margin-top:12px;
    }

    .item{
      display:flex;
      align-items:center;
      gap:12px;
      border:1px solid #ecd7bc;
      border-radius:14px;
      padding:12px 13px;
      text-decoration:none;
      color:var(--c2);
      background:#fffdfa;
      transition:.2s ease;
      min-height:64px;
    }

    .item:hover{
      transform:translateY(-2px);
      background:#fff;
      border-color:#e6cfae;
      box-shadow:0 8px 16px rgba(80,44,22,.09);
    }

    .icon{
      width:28px;
      height:28px;
      flex:0 0 28px;
      display:grid;
      place-items:center;
    }

    .icon svg{
      width:100%;
      height:100%;
      display:block;
    }

    .txt{min-width:0;line-height:1.2}
    .label{
      display:block;
      font-size:.78rem;
      color:var(--muted);
      font-weight:600;
      margin-bottom:2px;
    }

    .value{
      display:block;
      font-size:.94rem;
      font-weight:700;
      color:var(--c2);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    /* ======= ALAMAT / MAPS (SUDAH DIPERKECIL) ======= */
    .location-card{
      border:1px solid #ecdcc5;
      border-radius:20px;
      background:linear-gradient(145deg,#fffefb,#fff8ee);
      box-shadow:0 10px 24px rgba(80,44,22,.10);
      padding:16px 16px 12px;
    }

    .location-title{
      text-align:center;
      font-size:1.2rem;
      color:var(--c2);
      font-weight:700;
      margin-bottom:10px;
      line-height:1.2;
    }

    .location-title span{
      font-size:1rem;
      margin-right:6px;
      vertical-align:middle;
    }

    .location-line{
      height:3px;
      border-radius:99px;
      background:#e2a02f;
      width:100%;
      margin-bottom:12px;
    }

    .map-wrap{
      position:relative;
      border-radius:16px;
      overflow:hidden;
      border:1px solid #e7d5bb;
      background:#ddd;
      min-height:420px;
    }

    .map-wrap iframe{
      width:100%;
      height:420px;
      border:0;
      display:block;
    }

    .open-maps{
      position:absolute;
      top:12px;
      left:12px;
      z-index:2;
      display:inline-flex;
      align-items:center;
      gap:6px;
      text-decoration:none;
      font-weight:600;
      font-size:.82rem;
      color:#1a73e8;
      background:#fff;
      border:1px solid #d7d7d7;
      border-radius:8px;
      padding:7px 10px;
      box-shadow:0 3px 10px rgba(0,0,0,.12);
    }

    .maps-bottom-link{
      margin-top:10px;
      text-align:center;
    }

    .maps-bottom-link a{
      text-decoration:none;
      color:#e29613;
      font-weight:600;
      font-size:.88rem;
    }

    .maps-bottom-link a:hover{ text-decoration:underline; }

    @media (max-width:920px){
      .list{grid-template-columns:1fr;}
      .pattern{width:100%;}
      .map-wrap,.map-wrap iframe{min-height:360px;height:360px;}
    }

    @media (max-width:640px){
      .main{padding:14px}
      .menu a{font-size:.92rem;padding:8px 12px}
      .contact-card,.location-card{padding:14px}
      .map-wrap,.map-wrap iframe{min-height:300px;height:300px;}

      .location-title{font-size:1.05rem}
      .location-title span{font-size:.92rem}
      .open-maps{font-size:.76rem;padding:6px 9px}
      .maps-bottom-link a{font-size:.82rem}
    }
  </style>
</head>
