<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Education | Erza Afinda Putri</title>
  <meta name="description" content="Pendidikan Erza Afinda Putri" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root{
      --c1:#2f1b0f;
      --c2:#5b361b;
      --c3:#8b5b2d;
      --c4:#c68a2f;
      --c5:#e5b04a;
      --text:#3f2514;
      --muted:#7c5a43;
      --line:#ead9c0;
      --bg1:#fffefb;
      --bg2:#fff8ed;
      --card:#fffdf8;
      --shadow:0 16px 40px rgba(80,44,22,.14);
    }

    *{box-sizing:border-box;margin:0;padding:0}

    html,body{
      width:100%;
      min-height:100%;
      font-family:"Poppins",sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(229,176,74,.20), transparent 35%),
        linear-gradient(135deg,var(--bg1) 0%, var(--bg2) 45%, #fffdf6 100%);
    }

    body{overflow-y:auto}

    .container{
      width:min(1320px,96%);
      min-height:94vh;
      margin:3vh auto;
      border-radius:26px;
      border:1px solid #ecdcc5;
      background:linear-gradient(145deg, rgba(255,255,255,.96), rgba(255,250,241,.9));
      box-shadow:var(--shadow);
      overflow:hidden;
      display:grid;
      grid-template-rows:auto 1fr;
      position:relative;
    }

    .navbar{
      min-height:78px;
      border-bottom:1px solid #ecdcc5;
      background:linear-gradient(90deg, rgba(255,248,233,.96), rgba(255,255,255,.94));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:10px 18px;
      z-index:5;
    }

    .menu{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .menu a{
      text-decoration:none;
      color:var(--c2);
      font-weight:800;
      padding:10px 16px;
      border-radius:14px;
      transition:.22s ease;
      font-size:1rem;
      background:transparent;
    }

    .menu a:hover{background:#fff;color:var(--c3)}

    .menu a.active{
      background:linear-gradient(145deg,#fffefb,#fff7ea);
      color:var(--c4);
      box-shadow:inset 0 -2px 0 rgba(198,138,47,.8);
    }

    .pattern{
      position:absolute;
      right:0; top:0; bottom:0;
      width:52%;
      opacity:.14;
      pointer-events:none;
      background:
        linear-gradient(135deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22)),
        linear-gradient(45deg, rgba(91,54,27,.22) 12%, transparent 12.5%, transparent 87%, rgba(91,54,27,.22) 87.5%, rgba(91,54,27,.22));
      background-size:140px 200px;
    }

    .main{
      position:relative;
      z-index:2;
      padding:24px 24px 28px;
      display:grid;
      grid-template-rows:auto auto 1fr;
      gap:14px;
      min-height:0;
    }

    .heading{
      text-align:center;
    }

    .heading h1{
      font-size:clamp(1.55rem,2.8vw,2.2rem);
      color:var(--c2);
      font-weight:800;
      letter-spacing:.2px;
      margin-bottom:4px;
    }

    .heading p{
      color:var(--c3);
      font-size:clamp(.9rem,1.2vw,1rem);
      font-weight:600;
    }

    .divider{
      width:min(860px,96%);
      height:1px;
      margin:0 auto;
      background:linear-gradient(to right, transparent, #d8be96, transparent);
      position:relative;
    }

    .divider::after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:10px;height:10px;border-radius:50%;
      background:var(--c4);
      box-shadow:0 0 0 4px rgba(198,138,47,.14);
    }

    .edu-grid{
      width:min(1120px,100%);
      margin:0 auto;
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:18px;
    }

    .edu-card{
      border:1px solid #ecdcc5;
      border-radius:18px;
      background:linear-gradient(145deg,#fffefb,#fff8ee);
      box-shadow:0 10px 24px rgba(80,44,22,.10);
      padding:14px;
      display:grid;
      grid-template-rows:auto auto;
      gap:10px;
      align-items:start;
      min-height:250px;
      text-align:center;
      transition:.22s ease;
    }

    .edu-card:hover{
      transform:translateY(-2px);
      box-shadow:0 14px 28px rgba(80,44,22,.13);
    }

    .edu-photo-wrap{
      width:110px;
      height:110px;
      border-radius:14px;
      background:linear-gradient(145deg,#7a4a24,#5b361b 55%,#3e2412);
      padding:5px;
      margin:0 auto;
      flex-shrink:0;
    }

    .edu-photo{
      width:100%;
      height:100%;
      border-radius:10px;
      overflow:hidden;
      background:#f8f8f8;
    }

    .edu-photo img{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
    }

    .edu-content{
      display:flex;
      flex-direction:column;
      gap:5px;
      align-items:center;
    }

    .edu-year{
      color:var(--c4);
      font-weight:800;
      font-size:.88rem;
      letter-spacing:.2px;
    }

    .edu-title{
      color:var(--c2);
      font-weight:700;
      font-size:1rem;
      line-height:1.35;
    }

    .edu-major{
      color:var(--muted);
      font-size:.9rem;
      line-height:1.45;
      font-weight:500;
    }

    @media (max-width:1050px){
      .main{padding:20px 16px 22px}
      .edu-grid{
        grid-template-columns:1fr;
        gap:12px;
      }

      .edu-card{
        grid-template-columns:96px 1fr;
        grid-template-rows:1fr;
        text-align:left;
        align-items:center;
        min-height:unset;
      }

      .edu-photo-wrap{
        width:96px;
        height:96px;
      }

      .edu-content{
        align-items:flex-start;
      }

      .pattern{width:100%}
    }

    @media (max-width:640px){
      .container{
        margin:16px auto;
        min-height:auto;
      }

      .menu a{font-size:.92rem;padding:8px 12px}
      .main{padding:16px 12px 18px}

      .edu-card{
        grid-template-columns:84px 1fr;
        gap:10px;
        padding:10px;
        border-radius:14px;
      }

      .edu-photo-wrap{
        width:84px;
        height:84px;
        border-radius:10px;
      }

      .edu-photo{border-radius:8px}
      .edu-year{font-size:.78rem}
      .edu-title{font-size:.9rem}
      .edu-major{font-size:.8rem}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="pattern" aria-hidden="true"></div>

    <header class="navbar">
      <nav class="menu">
        <a href="index.html">Home</a>
        <a href="about.html">About Me</a>
        <a class="active" href="education.html">Education</a>
        <a href="pengalaman.html">Experience</a>
        <a href="tools-skill.html">Tools & Skill</a>
        <a href="portofolio.html">Portofolio</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <main class="main">
      <section class="heading">
        <h1>Education</h1>
        <p>Riwayat Pendidikan</p>
      </section>

      <div class="divider" aria-hidden="true"></div>

      <section class="edu-grid">
        <article class="edu-card">
          <div class="edu-photo-wrap">
            <div class="edu-photo">
              <img id="imgSmp" src="Gambar/Smp.jpg" alt="Foto SMP Negeri 14 Bengkulu Selatan">
            </div>
          </div>
          <div class="edu-content">
            <div class="edu-year">2016 - 2019</div>
            <h3 class="edu-title">SMP Negeri 14 Bengkulu Selatan</h3>
          </div>
        </article>

        <article class="edu-card">
          <div class="edu-photo-wrap">
            <div class="edu-photo">
              <img id="imgSmk" src="Gambar/Smk.jpg" alt="Foto SMK Negeri 1 Kota Bengkulu">
            </div>
          </div>
          <div class="edu-content">
            <div class="edu-year">2019 - 2022</div>
            <h3 class="edu-title">SMK Negeri 1 Kota Bengkulu</h3>
            <div class="edu-major">Jurusan Multimedia</div>
          </div>
        </article>

        <article class="edu-card">
          <div class="edu-photo-wrap">
            <div class="edu-photo">
              <img id="imgKampus" src="Gambar/Kampus.jpg" alt="Foto ITB STIKOM Bali">
            </div>
          </div>
          <div class="edu-content">
            <div class="edu-year">2022 - 2026</div>
            <h3 class="edu-title">ITB STIKOM Bali</h3>
            <div class="edu-major">S1 Sistem Komputer</div>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script>
    function setSmartImage(imgId, baseName, fallbackText){
      const img = document.getElementById(imgId);
      const formats = [".jpg", ".jpeg", ".png", ".webp"];
      let i = 0;

      function tryNext(){
        if(i >= formats.length){
          img.src = "https://via.placeholder.com/400x400?text=" + encodeURIComponent(fallbackText);
          return;
        }
        const file = "Gambar/" + baseName + formats[i];
        const t = new Image();
        t.onload = () => { img.src = file; };
        t.onerror = () => { i++; tryNext(); };
        t.src = file;
      }

      tryNext();
    }

    setSmartImage("imgSmp", "Smp", "Foto SMP");
    setSmartImage("imgSmk", "Smk", "Foto SMK");
    setSmartImage("imgKampus", "Kampus", "Foto Kampus");
  </script>
</body>
</html>
